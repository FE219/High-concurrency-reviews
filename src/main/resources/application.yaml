server:
  port: 8081
spring:
  application:
    name: hmdp
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/hmdp?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:your-mysql-password}
  redis:
    host: ${REDIS_HOST:192.168.137.128}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:your-redis-password}
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY:sk-your-dashscope-api-key}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
    dashscope:
      embedding:
        enabled: true
        api-key: ${DASHSCOPE_API_KEY:sk-your-dashscope-api-key}
        base-url: https://dashscope.aliyuncs.com/api/v1/services/embeddings/text-embedding/text-embedding
        options:
          model: text-embedding-v3
    vectorstore:
      milvus:
        client:
          host: ${MILVUS_HOST:192.168.137.128}
          port: ${MILVUS_PORT:19530}
          faq-collection: faq_vector
          blog-collection: blog_vector
mybatis-plus:
  type-aliases-package: com.hmdp.entity # 别名扫描包
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
logging:
  level:
    com.hmdp: debug

