spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/hmdp?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
    dashscope:
      embedding:
        enabled: true
        api-key: ${DASHSCOPE_API_KEY:}
        base-url: https://dashscope.aliyuncs.com/api/v1/services/embeddings/text-embedding/text-embedding
        options:
          model: text-embedding-v3
    vectorstore:
      milvus:
        client:
          host: ${MILVUS_HOST:localhost}
          port: ${MILVUS_PORT:19530}
          faq-collection: faq_vector
          blog-collection: blog_vector
logging:
  level:
    com.hmdp: info
